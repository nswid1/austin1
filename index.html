<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Service NSW</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Service NSW">
  <link rel="apple-touch-icon" href="icon.png.png">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000000;
      overflow: hidden;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #ffffff;
    }
    #privacyShield {
      position: fixed;
      inset: 0;
      background: #000000;
      z-index: 999999;
      display: none;
      -webkit-box-align: center;
      -ms-flex-align: center;
      align-items: center;
      -webkit-box-pack: center;
      -ms-flex-pack: center;
      justify-content: center;
      pointer-events: none;
    }
    #privacyShield.show {
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
    }
    #privacyShield img {
      max-width: 65%;
      max-height: 65%;
      width: auto;
      height: auto;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.2s ease-in-out;
    }
    #privacyShield.show img {
      opacity: 1;
    }
  </style>
</head>
<body>

  <iframe
    src="https://cloud.protopie.io/p/dd5e703bd227f43bab122552?ui=false&scaleToFit=true&enableHotspotHints=false&cursorType=touch&mockup=false&bgColor=%23F5F5F5&bgImage=undefined&playSpeed=1">
  </iframe>

  <div id="privacyShield">
    <img src="https://www.service.nsw.gov.au/themes/snsw_theme/images/ServiceNSW_og.png" alt="Service NSW" id="shieldLogo">
  </div>

  <script>
    const shield = document.getElementById('privacyShield');
    const logo = document.getElementById('shieldLogo');

    // Preload image
    const preload = new Image();
    preload.src = logo.src;
    preload.onload = () => console.log('Logo loaded successfully');
    preload.onerror = () => console.error('Logo failed to load - check URL or network');

    function showShield() {
      shield.classList.add('show');
    }

    function hideShield() {
      shield.classList.remove('show');
    }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        showShield();
      } else {
        hideShield();
      }
    });

    window.addEventListener('blur', showShield);
    window.addEventListener('focus', hideShield);
    window.addEventListener('pagehide', showShield);

    // iOS resume/safety check
    setTimeout(() => {
      if (document.hidden) showShield();
    }, 50);

    // Initial check
    if (document.hidden) showShield();
  </script>

</body>
</html>
